name: Publish to NPM

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
  workflow_call:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump versions
        run: |
          BUMP_TYPE="${{ inputs.version_bump || 'patch' }}"
          echo "Bumping versions ($BUMP_TYPE)..."
          npm version $BUMP_TYPE -ws --no-git-tag-version
          node scripts/sync-versions.js
          echo "New package versions:"
          cat packages/*/package.json | grep '"version"' | head -20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build packages
        run: |
          echo "Building packages in dependency order..."
          (cd packages/tui && npm run build)
          (cd packages/ai && npm run build)
          (cd packages/agent && npm run build)
          (cd packages/coding-agent && npm run build)

      - name: Auto-discover and publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm config set //registry.npmjs.org/:_authToken "${NODE_AUTH_TOKEN}" --location=user
          npm config set //registry.npmjs.org/:_authToken "${NODE_AUTH_TOKEN}" --location=global 2>/dev/null || true
          npm whoami && echo "✅ Authenticated" || { echo "❌ Auth failed"; exit 1; }

          # Step 1: Discover packages and create mapping
          node << 'DISCOVER_SCRIPT'
          const fs = require("fs");
          const path = require("path");

          const packagesDir = "packages";
          const dirs = fs.readdirSync(packagesDir).filter(d =>
            fs.statSync(path.join(packagesDir, d)).isDirectory() &&
            fs.existsSync(path.join(packagesDir, d, "package.json"))
          );

          const packageMap = {};
          const depMap = {};

          for (const dir of dirs) {
            const pkg = JSON.parse(fs.readFileSync(path.join(packagesDir, dir, "package.json"), "utf8"));
            const origName = pkg.name;
            if (!origName || !origName.startsWith("@mariozechner/")) continue;

            let newName;
            if (origName === "@mariozechner/pi") {
              newName = "@hyperspaceng/neural-pods";
            } else if (origName.startsWith("@mariozechner/pi-")) {
              newName = "@hyperspaceng/neural-" + origName.replace("@mariozechner/pi-", "");
            } else {
              newName = "@hyperspaceng/neural-" + origName.replace("@mariozechner/", "");
            }

            packageMap[dir] = { origName, newName };
            depMap[origName] = newName;
          }

          // Topological sort
          const graph = {};
          for (const dir of Object.keys(packageMap)) {
            const pkg = JSON.parse(fs.readFileSync(path.join("packages", dir, "package.json"), "utf8"));
            graph[dir] = [];
            for (const dt of ["dependencies", "devDependencies", "peerDependencies"]) {
              if (pkg[dt]) {
                for (const dep of Object.keys(pkg[dt])) {
                  for (const [d, info] of Object.entries(packageMap)) {
                    if (info.origName === dep && d !== dir) graph[dir].push(d);
                  }
                }
              }
            }
          }
          const visited = new Set(), order = [];
          function visit(n) { if (visited.has(n)) return; visited.add(n); (graph[n]||[]).forEach(visit); order.push(n); }
          Object.keys(packageMap).forEach(visit);

          console.log("Discovered packages:");
          for (const [dir, info] of Object.entries(packageMap)) {
            console.log("  " + dir + ": " + info.origName + " -> " + info.newName);
          }
          console.log("\nPublish order: " + order.join(" "));

          fs.writeFileSync("/tmp/package_map.json", JSON.stringify(packageMap));
          fs.writeFileSync("/tmp/dep_map.json", JSON.stringify(depMap));
          fs.writeFileSync("/tmp/publish_order.txt", order.join("\n"));
          DISCOVER_SCRIPT

          echo ""
          echo "=== Publishing packages ==="

          PUBLISH_ORDER=$(cat /tmp/publish_order.txt)

          for pkg_dir in $PUBLISH_ORDER; do
            PKG_DIR="packages/$pkg_dir"
            [ ! -f "$PKG_DIR/package.json" ] && continue

            NEW_NAME=$(node -e "const m=JSON.parse(require('fs').readFileSync('/tmp/package_map.json','utf8'));console.log(m['$pkg_dir']?.newName||'')")
            ORIG_NAME=$(node -e "const m=JSON.parse(require('fs').readFileSync('/tmp/package_map.json','utf8'));console.log(m['$pkg_dir']?.origName||'')")
            [ -z "$NEW_NAME" ] && continue

            echo ""
            echo "📦 Publishing $NEW_NAME (from $ORIG_NAME)..."
            cd "$PKG_DIR"

            # Rewrite package.json
            node << REWRITE_PKG
            const fs = require("fs");
            const depMap = JSON.parse(fs.readFileSync("/tmp/dep_map.json", "utf8"));
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            pkg.name = "$NEW_NAME";
            for (const dt of ["dependencies", "devDependencies", "peerDependencies", "optionalDependencies"]) {
              if (pkg[dt]) {
                const nd = {};
                for (const [n, v] of Object.entries(pkg[dt])) { nd[depMap[n] || n] = v; }
                pkg[dt] = nd;
              }
            }
            fs.writeFileSync("package.json", JSON.stringify(pkg, null, "\t"));
          REWRITE_PKG

            # Rewrite imports in dist/src using sed (most reliable, no JS edge cases)
            # Process longest package names first to avoid partial matches
            echo "  Rewriting imports with sed..."

            # Build sed commands sorted by length (longest first)
            node -e "
            const depMap = JSON.parse(require('fs').readFileSync('/tmp/dep_map.json', 'utf8'));
            const sorted = Object.entries(depMap).sort((a, b) => b[0].length - a[0].length);
            const cmds = sorted.map(([orig, repl]) => 's|' + orig.replace(/\//g, '\\\\/') + '|' + repl.replace(/\//g, '\\\\/') + '|g');
            require('fs').writeFileSync('/tmp/sed_commands.txt', cmds.join('\n'));
            console.log('  Sed commands (' + cmds.length + '):');
            cmds.forEach(c => console.log('    ' + c));
            "

            # Apply sed to all dist files
            if [ -d "dist" ]; then
              find dist -type f \( -name "*.js" -o -name "*.ts" -o -name "*.map" -o -name "*.mjs" -o -name "*.cjs" \) | while read f; do
                sed -f /tmp/sed_commands.txt -i "$f"
              done
              echo "  Done rewriting dist files"
            fi
            if false; then  # DO NOT rewrite src - only dist gets rewritten at publish time
              find src -type f \( -name "*.js" -o -name "*.ts" -o -name "*.map" -o -name "*.mjs" -o -name "*.cjs" \) | while read f; do
                sed -f /tmp/sed_commands.txt -i "$f"
              done
              echo "  Done rewriting src files"
            fi

            # Debug: verify the rewrite worked for coding-agent
            if [ "$pkg_dir" = "coding-agent" ]; then
              echo "  DEBUG: checking config-selector.js after rewrite:"
              grep "pi-tui\|neural-tui\|neural-pods-tui" dist/cli/config-selector.js 2>/dev/null || echo "    (no matches found)"
            fi

            # Publish
            npm publish --access public --ignore-scripts 2>&1 || echo "⚠️ Failed to publish $NEW_NAME"

            # Restore package.json only (dist is gitignored, not affected by git checkout)
            git checkout -- package.json 2>/dev/null || true

            cd - > /dev/null
          done

          echo ""
          echo "✅ All packages published!"

      - name: Commit version bumps
        run: |
          git add -A
          HUSKY=0 git commit --no-verify -m "Bump versions for NPM release [skip ci]" || echo "No changes to commit"
          git push origin main || echo "Nothing to push"

      - name: Create Git tag
        run: |
          VERSION=$(cat packages/coding-agent/package.json | grep '"version"' | head -1 | cut -d'"' -f4)
          TAG="v${VERSION}"
          echo "Creating tag: $TAG"
          git tag $TAG 2>/dev/null && git push origin $TAG || echo "Tag $TAG already exists, skipping"
        continue-on-error: true

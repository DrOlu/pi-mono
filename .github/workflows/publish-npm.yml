name: Publish to NPM

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
  workflow_call:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump versions
        run: |
          BUMP_TYPE="${{ inputs.version_bump || 'patch' }}"
          echo "Bumping versions ($BUMP_TYPE)..."
          npm version $BUMP_TYPE -ws --no-git-tag-version

          # Sync versions across packages
          node scripts/sync-versions.js

          # Show new versions
          echo "New package versions:"
          cat packages/*/package.json | grep '"version"' | head -10

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build packages
        run: |
          echo "Building packages in dependency order..."
          (cd packages/tui && npm run build)
          (cd packages/ai && npm run build)
          (cd packages/agent && npm run build)
          (cd packages/coding-agent && npm run build)

      - name: Rename packages for @hyperspaceng scope and publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Configure npm auth using npm config set (bypasses all .npmrc path issues)
          npm config set //registry.npmjs.org/:_authToken "${NODE_AUTH_TOKEN}" --location=user
          npm config set //registry.npmjs.org/:_authToken "${NODE_AUTH_TOKEN}" --location=global 2>/dev/null || true
          npm whoami && echo "✅ Authenticated" || { echo "❌ Auth failed"; exit 1; }

          echo "Publishing packages to NPM under @hyperspaceng scope..."

          # Map of directories to @hyperspaceng package names
          declare -A PACKAGE_MAP
          PACKAGE_MAP[tui]="@hyperspaceng/neural-tui"
          PACKAGE_MAP[ai]="@hyperspaceng/neural-ai"
          PACKAGE_MAP[agent]="@hyperspaceng/neural-agent-core"
          PACKAGE_MAP[coding-agent]="@hyperspaceng/neural-coding-agent"
          PACKAGE_MAP[web-ui]="@hyperspaceng/neural-web-ui"
          PACKAGE_MAP[pods]="@hyperspaceng/neural-pods"
          PACKAGE_MAP[mom]="@hyperspaceng/neural-mom"

          # Map of original @mariozechner names to @hyperspaceng names (for dependency remapping)
          declare -A DEP_MAP
          DEP_MAP["@mariozechner/pi-tui"]="@hyperspaceng/neural-tui"
          DEP_MAP["@mariozechner/pi-ai"]="@hyperspaceng/neural-ai"
          DEP_MAP["@mariozechner/pi-agent-core"]="@hyperspaceng/neural-agent-core"
          DEP_MAP["@mariozechner/pi-coding-agent"]="@hyperspaceng/neural-coding-agent"
          DEP_MAP["@mariozechner/pi-web-ui"]="@hyperspaceng/neural-web-ui"
          DEP_MAP["@mariozechner/pi"]="@hyperspaceng/neural-pods"
          DEP_MAP["@mariozechner/pi-mom"]="@hyperspaceng/neural-mom"

          # Publish order
          PUBLISH_ORDER=(tui ai agent coding-agent web-ui pods mom)

          for pkg in "${PUBLISH_ORDER[@]}"; do
            PKG_DIR="packages/$pkg"
            NEW_NAME="${PACKAGE_MAP[$pkg]}"

            echo ""
            echo "📦 Publishing $NEW_NAME..."

            # Temporarily rename the package and remap dependencies for npm publish
            cd "$PKG_DIR"
            ORIG_NAME=$(node -e "console.log(require('./package.json').name)")

            # Update package.json: rename package and remap @mariozechner dependencies to @hyperspaceng
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              pkg.name = '$NEW_NAME';

              const depMap = JSON.parse('$(node -e "
                const m = {};
                m['@mariozechner/pi-tui'] = '@hyperspaceng/neural-tui';
                m['@mariozechner/pi-ai'] = '@hyperspaceng/neural-ai';
                m['@mariozechner/pi-agent-core'] = '@hyperspaceng/neural-agent-core';
                m['@mariozechner/pi-coding-agent'] = '@hyperspaceng/neural-coding-agent';
                m['@mariozechner/pi-web-ui'] = '@hyperspaceng/neural-web-ui';
                m['@mariozechner/pi'] = '@hyperspaceng/neural-pods';
                m['@mariozechner/pi-mom'] = '@hyperspaceng/neural-mom';
                console.log(JSON.stringify(m));
              ")');

              for (const depType of ['dependencies', 'devDependencies', 'peerDependencies', 'optionalDependencies']) {
                if (pkg[depType]) {
                  const newDeps = {};
                  for (const [name, version] of Object.entries(pkg[depType])) {
                    if (depMap[name]) {
                      newDeps[depMap[name]] = version;
                    } else {
                      newDeps[name] = version;
                    }
                  }
                  pkg[depType] = newDeps;
                }
              }

              fs.writeFileSync('package.json', JSON.stringify(pkg, null, '\t'));
            "

            # Publish (ignore errors for individual packages — web-ui/pods/mom may fail to build)
            npm publish --access public --ignore-scripts 2>&1 || echo "⚠️ Failed to publish $NEW_NAME (may already exist or build issue)"

            # Restore original name and dependencies
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              pkg.name = '$ORIG_NAME';

              const reverseMap = JSON.parse('$(node -e "
                const m = {};
                m['@hyperspaceng/neural-tui'] = '@mariozechner/pi-tui';
                m['@hyperspaceng/neural-ai'] = '@mariozechner/pi-ai';
                m['@hyperspaceng/neural-agent-core'] = '@mariozechner/pi-agent-core';
                m['@hyperspaceng/neural-coding-agent'] = '@mariozechner/pi-coding-agent';
                m['@hyperspaceng/neural-web-ui'] = '@mariozechner/pi-web-ui';
                m['@hyperspaceng/neural-pods'] = '@mariozechner/pi';
                m['@hyperspaceng/neural-mom'] = '@mariozechner/pi-mom';
                console.log(JSON.stringify(m));
              ")');

              for (const depType of ['dependencies', 'devDependencies', 'peerDependencies', 'optionalDependencies']) {
                if (pkg[depType]) {
                  const newDeps = {};
                  for (const [name, version] of Object.entries(pkg[depType])) {
                    if (reverseMap[name]) {
                      newDeps[reverseMap[name]] = version;
                    } else {
                      newDeps[name] = version;
                    }
                  }
                  pkg[depType] = newDeps;
                }
              }

              fs.writeFileSync('package.json', JSON.stringify(pkg, null, '\t'));
            "

            cd - > /dev/null
          done

          echo ""
          echo "✅ All packages published!"

      - name: Commit version bumps
        run: |
          git add -A
          HUSKY=0 git commit --no-verify -m "Bump versions for NPM release [skip ci]" || echo "No changes to commit"
          git push origin main || echo "Nothing to push"

      - name: Create Git tag
        run: |
          VERSION=$(cat packages/coding-agent/package.json | grep '"version"' | head -1 | cut -d'"' -f4)
          TAG="v${VERSION}"
          echo "Creating tag: $TAG"
          git tag $TAG 2>/dev/null && git push origin $TAG || echo "Tag $TAG already exists, skipping"
        continue-on-error: true

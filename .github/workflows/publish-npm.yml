name: Publish to NPM

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
  workflow_call:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump versions
        run: |
          BUMP_TYPE="${{ inputs.version_bump || 'patch' }}"
          echo "Bumping versions ($BUMP_TYPE)..."
          npm version $BUMP_TYPE -ws --no-git-tag-version

          # Sync versions across packages
          node scripts/sync-versions.js

          # Show new versions
          echo "New package versions:"
          cat packages/*/package.json | grep '"version"' | head -20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build packages
        run: |
          echo "Building packages in dependency order..."
          (cd packages/tui && npm run build)
          (cd packages/ai && npm run build)
          (cd packages/agent && npm run build)
          (cd packages/coding-agent && npm run build)

      - name: Auto-discover packages and publish under @hyperspaceng scope
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Configure npm auth
          npm config set //registry.npmjs.org/:_authToken "${NODE_AUTH_TOKEN}" --location=user
          npm config set //registry.npmjs.org/:_authToken "${NODE_AUTH_TOKEN}" --location=global 2>/dev/null || true
          npm whoami && echo "✅ Authenticated" || { echo "❌ Auth failed"; exit 1; }

          echo ""
          echo "=== Auto-discovering @mariozechner packages and generating @hyperspaceng mappings ==="
          echo ""

          # Auto-discover all packages and build mapping dynamically
          node -e "
          const fs = require('fs');
          const path = require('path');

          const packagesDir = 'packages';
          const dirs = fs.readdirSync(packagesDir).filter(d =>
            fs.statSync(path.join(packagesDir, d)).isDirectory() &&
            fs.existsSync(path.join(packagesDir, d, 'package.json'))
          );

          const packageMap = {};
          const depMap = {};

          for (const dir of dirs) {
            const pkgPath = path.join(packagesDir, dir, 'package.json');
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            const origName = pkg.name;

            if (!origName) continue;

            let newName;
            if (origName.startsWith('@mariozechner/pi-')) {
              const suffix = origName.replace('@mariozechner/pi-', '');
              newName = '@hyperspaceng/neural-' + suffix;
            } else if (origName === '@mariozechner/pi') {
              newName = '@hyperspaceng/neural-pods';
            } else if (origName.startsWith('@mariozechner/')) {
              const suffix = origName.replace('@mariozechner/', '');
              newName = '@hyperspaceng/neural-' + suffix;
            } else {
              continue;
            }

            packageMap[dir] = { origName, newName };
            depMap[origName] = newName;
          }

          console.log('Discovered packages:');
          console.log(JSON.stringify(packageMap, null, 2));
          console.log('');
          console.log('Dependency mapping:');
          console.log(JSON.stringify(depMap, null, 2));

          fs.writeFileSync('/tmp/package_map.json', JSON.stringify(packageMap));
          fs.writeFileSync('/tmp/dep_map.json', JSON.stringify(depMap));
          "

          echo ""
          echo "=== Determining publish order ==="
          echo ""

          node -e "
          const fs = require('fs');
          const path = require('path');

          const packageMap = JSON.parse(fs.readFileSync('/tmp/package_map.json', 'utf8'));
          const dirs = Object.keys(packageMap);

          const graph = {};
          for (const dir of dirs) {
            const pkgPath = path.join('packages', dir, 'package.json');
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            graph[dir] = [];
            for (const depType of ['dependencies', 'devDependencies', 'peerDependencies']) {
              if (pkg[depType]) {
                for (const depName of Object.keys(pkg[depType])) {
                  for (const [d, info] of Object.entries(packageMap)) {
                    if (info.origName === depName && d !== dir) {
                      graph[dir].push(d);
                    }
                  }
                }
              }
            }
          }

          const visited = new Set();
          const order = [];
          function visit(node) {
            if (visited.has(node)) return;
            visited.add(node);
            for (const dep of (graph[node] || [])) { visit(dep); }
            order.push(node);
          }
          dirs.forEach(visit);

          console.log('Publish order: ' + order.join(' '));
          fs.writeFileSync('/tmp/publish_order.txt', order.join('\n'));
          "

          echo ""
          echo "=== Publishing packages ==="
          echo ""

          PUBLISH_ORDER=$(cat /tmp/publish_order.txt)

          for pkg_dir in $PUBLISH_ORDER; do
            PKG_DIR="packages/$pkg_dir"
            if [ ! -f "$PKG_DIR/package.json" ]; then
              continue
            fi

            NEW_NAME=$(node -e "const m = JSON.parse(require('fs').readFileSync('/tmp/package_map.json','utf8')); console.log(m['$pkg_dir']?.newName || '')")
            ORIG_NAME=$(node -e "const m = JSON.parse(require('fs').readFileSync('/tmp/package_map.json','utf8')); console.log(m['$pkg_dir']?.origName || '')")

            if [ -z "$NEW_NAME" ] || [ -z "$ORIG_NAME" ]; then
              echo "⏭️  Skipping $pkg_dir (not a @mariozechner package)"
              continue
            fi

            echo ""
            echo "📦 Publishing $NEW_NAME (from $ORIG_NAME)..."

            cd "$PKG_DIR"

            # 1. Rename package and remap dependencies in package.json
            node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const depMap = JSON.parse(fs.readFileSync('/tmp/dep_map.json', 'utf8'));

            pkg.name = '$NEW_NAME';

            for (const depType of ['dependencies', 'devDependencies', 'peerDependencies', 'optionalDependencies']) {
              if (pkg[depType]) {
                const newDeps = {};
                for (const [name, version] of Object.entries(pkg[depType])) {
                  newDeps[depMap[name] || name] = version;
                }
                pkg[depType] = newDeps;
              }
            }

            fs.writeFileSync('package.json', JSON.stringify(pkg, null, '\t'));
            "

            # 2. Rewrite @mariozechner/* import paths in compiled dist/ files (JS, JS.MAP, D.TS)
            node -e "
            const fs = require('fs');
            const path = require('path');
            const depMap = JSON.parse(fs.readFileSync('/tmp/dep_map.json', 'utf8'));

            function walkDir(dir) {
              if (!fs.existsSync(dir)) return [];
              const files = [];
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const fullPath = path.join(dir, entry.name);
                if (entry.isDirectory()) {
                  files.push(...walkDir(fullPath));
                } else if (/\.(js|mjs|cjs|ts|d\.ts|map)$/.test(entry.name)) {
                  files.push(fullPath);
                }
              }
              return files;
            }

            // Also rewrite src/ files in case they are included in the published package
            const dirs = ['dist', 'src'];
            let totalRewrites = 0;

            for (const d of dirs) {
              const files = walkDir(d);
              for (const file of files) {
                let content = fs.readFileSync(file, 'utf8');
                let modified = false;

                for (const [origPkg, newPkg] of Object.entries(depMap)) {
                  // Match import/require strings: '@mariozechner/pi-ai' or '@mariozechner/pi-ai/something'
                  const escaped = origPkg.replace(/[.*+?^\${}()|[\]\\\\]/g, '\\\\\\$&');
                  const regex = new RegExp(escaped.replace(/\\\\\\\\/g, '\\\\'), 'g');
                  if (content.includes(origPkg)) {
                    content = content.split(origPkg).join(newPkg);
                    modified = true;
                    totalRewrites++;
                  }
                }

                if (modified) {
                  fs.writeFileSync(file, content);
                }
              }
            }
            console.log('  Rewrote ' + totalRewrites + ' import references in dist/src files');
            "

            # Publish
            npm publish --access public --ignore-scripts 2>&1 || echo "⚠️ Failed to publish $NEW_NAME (may already exist or build issue)"

            # 3. Restore original package.json and dist/src files via git checkout
            git checkout -- . 2>/dev/null || true

            cd - > /dev/null
          done

          echo ""
          echo "✅ All packages published!"

      - name: Commit version bumps
        run: |
          git add -A
          HUSKY=0 git commit --no-verify -m "Bump versions for NPM release [skip ci]" || echo "No changes to commit"
          git push origin main || echo "Nothing to push"

      - name: Create Git tag
        run: |
          VERSION=$(cat packages/coding-agent/package.json | grep '"version"' | head -1 | cut -d'"' -f4)
          TAG="v${VERSION}"
          echo "Creating tag: $TAG"
          git tag $TAG 2>/dev/null && git push origin $TAG || echo "Tag $TAG already exists, skipping"
        continue-on-error: true

name: Sync with Upstream

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to sync (default: main)'
        required: false
        default: 'main'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      synced: ${{ steps.sync.outputs.synced }}
      new_version: ${{ steps.version.outputs.new_version }}
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/badlogic/pi-mono.git
          git fetch upstream

      - name: Sync with upstream
        id: sync
        run: |
          BRANCH="${{ github.event.inputs.branch || 'main' }}"
          git checkout $BRANCH
          
          # Check if there are new commits from upstream
          UPSTREAM_COMMITS=$(git rev-list --count HEAD..upstream/$BRANCH)
          
          if [ "$UPSTREAM_COMMITS" -eq 0 ]; then
            echo "No new commits from upstream. Already up to date."
            echo "synced=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "Found $UPSTREAM_COMMITS new commits from upstream."
          echo "synced=true" >> $GITHUB_OUTPUT
          
          # Create a sync branch
          SYNC_BRANCH="sync/upstream-$(date +%Y%m%d-%H%M%S)"
          git checkout -b $SYNC_BRANCH
          
          # Merge upstream changes
          git merge upstream/$BRANCH --no-edit || {
            echo "Merge conflicts detected. Creating PR for manual resolution."
            git add -A
            git commit -m "WIP: Sync with upstream (conflicts need resolution)"
          }
          
          # Push the sync branch
          git push origin $SYNC_BRANCH
          
          # Create a pull request
          gh pr create \
            --title "Sync with upstream: $UPSTREAM_COMMITS new commits" \
            --body "This PR syncs the fork with upstream changes from badlogic/pi-mono.
          
          - **Commits to sync:** $UPSTREAM_COMMITS
          - **Upstream branch:** $BRANCH
          - **Sync date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          Please review and merge if there are no conflicts." \
            --base $BRANCH \
            --head $SYNC_BRANCH || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Auto-merge if no conflicts
        if: steps.sync.outputs.synced == 'true'
        run: |
          BRANCH="${{ github.event.inputs.branch || 'main' }}"
          
          # Check if merge was successful without conflicts
          if git merge-tree $(git merge-base HEAD upstream/$BRANCH) HEAD upstream/$BRANCH | grep -q "changed in both"; then
            echo "Conflicts detected. PR created for manual resolution."
            echo "synced=false" >> $GITHUB_OUTPUT
          else
            echo "No conflicts. Merging to $BRANCH..."
            git checkout $BRANCH
            git merge upstream/$BRANCH --no-edit
            git push origin $BRANCH
            echo "Successfully synced with upstream!"
          fi

      - name: Generate new version tag
        id: version
        if: steps.sync.outputs.synced == 'true'
        run: |
          # Get the latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"
          
          # Parse version components
          VERSION=${LATEST_TAG#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          
          # Increment patch version
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          
          echo "New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

  build-and-release:
    needs: sync
    if: needs.sync.outputs.synced == 'true'
    uses: ./.github/workflows/build-binaries.yml
    with:
      tag: ${{ needs.sync.outputs.new_version }}
    secrets: inherit
